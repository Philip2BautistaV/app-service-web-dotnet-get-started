# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
      - main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

steps:

# Restore
- task: NuGetCommand@2
  inputs:
    restoreSolution: '**/*.sln'

# Build + Publish in ONE step (important)
- task: VSBuild@1
  displayName: 'Build and Publish'
  inputs:
    solution: '**\aspnet-get-started.sln'
    platform: 'Any CPU'
    configuration: '$(buildConfiguration)'
    msbuildArgs: >
      /p:DeployOnBuild=true
      /p:WebPublishMethod=FileSystem
      /p:publishUrl=$(Build.ArtifactStagingDirectory)\
      /p:OutDir=$(Build.ArtifactStagingDirectory)\

# Verify output (debug step - optional but useful)
- script: dir "$(Build.ArtifactStagingDirectory)"
  displayName: 'Check publish output'

# Publish artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'